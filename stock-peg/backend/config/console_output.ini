[console_output]
# ========================================
# 控制台输出控制配置
# ========================================
# 说明：
# - 所有配置项均为布尔值：true(启用输出) / false(禁用输出)
# - 错误日志(error)默认始终输出，但可通过 enable_errors 关闭
# - 配置修改后需重启服务生效

# 总开关
enable_console_output = true

# -------- 数据类输出 --------

# 股票数据读取/更新日志
enable_stock_data = false

# 市场指数日志
enable_market_index = false

# K线数据日志
enable_kline_data = false

# 财务数据日志
enable_financial_data = false

# 美股市场数据日志
enable_us_market = false

# -------- 功能类输出 --------

# 数据更新进度日志
enable_update_progress = false

# 预加载进度日志
enable_preload_progress = false

# 缓存相关日志
enable_cache = false

# WebSocket连接日志
enable_websocket = false

# -------- 飞书机器人专用 --------

# 飞书机器人消息日志
enable_feishu_bot = true

# 飞书长连接日志
enable_feishu_connection = true

# 飞书对话日志
enable_feishu_chat = true

# -------- 其他输出 --------

# 定时任务日志
enable_scheduler = false

# 后台任务日志
enable_background_task = false

# 数据库操作日志
enable_database = false

# API请求日志
enable_api_request = false

# -------- 错误和警告 --------

# 错误日志(error级别) - 重要！建议保持开启
enable_errors = true

# 警告日志(warning级别) - 重要！建议保持开启
enable_warnings = true

# 调试日志(debug级别)
enable_debug = false

# -------- 启动信息 --------

# 启动进度日志
enable_startup_info = true

# 系统状态日志
enable_system_status = true


[output_control]
# ========================================
# 输出内容和长度控制
# ========================================

# 控制台单行最大长度（字符数），超过则截断
# 0 表示不限制，建议设置 200-500
console_max_line_length = 300

# 日志文件单行最大长度（字符数）
# 0 表示不限制（日志文件保留完整信息）
file_max_line_length = 0

# -------- SQL 语句输出控制 --------

# 是否在控制台输出 SQL 语句（建议关闭，太长）
enable_sql_in_console = false

# 是否在日志文件输出 SQL 语句（建议开启，便于调试）
enable_sql_in_file = true

# -------- 错误详情输出控制 --------

# 是否在控制台输出完整错误堆栈
enable_traceback_in_console = false

# 是否在日志文件输出完整错误堆栈
enable_traceback_in_file = true

# -------- 错误去重 --------

# 是否启用错误去重（相同错误在一段时间内只输出一次）
enable_error_dedup = true

# 错误去重时间窗口（秒）
error_dedup_window = 60

# 是否显示重复错误汇总（如"该错误已出现5次"）
show_error_summary = true

# -------- 数据结构输出控制 --------

# 是否在控制台输出长列表/字典（如股票代码列表）
enable_list_in_console = false

# 列表最大显示数量（超过则省略）
list_max_display = 5

# -------- 后台任务输出控制 --------

# 后台任务完成时是否在控制台输出详细信息
enable_background_task_detail = false

# 仅输出任务名称和状态（简化模式）
background_task_simple_mode = true


[progress_bar]
# ========================================
# 进度条配置
# ========================================

# 是否显示进度条
show_progress_bar = true

# 进度条更新间隔（毫秒）
progress_update_interval = 500


[server_debug_log]
# ========================================
# 服务器调试日志配置
# ========================================
# 说明：
# - 日志文件位置: logs/server-debug/server.log
# - 调试模式下建议启用 delete_on_restart 避免日志堆积
# - 生产模式下建议设置 backup_days = 30

# 是否启用服务器调试日志
enable_server_debug_log = true

# 日志文件最大大小（MB），超过则轮转
# 0 表示不限制大小
max_file_size_mb = 0

# 日志保留天数（生产模式）
# 调试模式下此配置无效，重启即删除
backup_days = 30

# 是否在服务器重启时删除旧日志（调试模式）
# true: 每次重启删除旧日志，适合调试阶段
# false: 保留历史日志，适合生产环境
delete_on_restart = true

# 日志轮转策略
# "daily": 每天午夜轮转
# "size": 按文件大小轮转
rotation_strategy = daily

# 是否在控制台显示日志文件创建信息
show_log_file_info = true

# 是否记录SQL语句到服务器调试日志
log_sql_statements = true

# 是否记录完整的错误堆栈
log_full_traceback = true

# 调试模式开关（自动影响多个配置）
# true: 启用调试模式，delete_on_restart = true，保留天数无效
# false: 生产模式，使用 backup_days 配置
debug_mode = true


[log_cleanup]
# ========================================
# 日志文件自动清理配置
# ========================================
# 说明：
# - 控制 logs/ 目录下所有子目录的日志文件
# - 支持按天数和文件数量双重限制
# - 服务器启动时自动执行清理

# 是否启用日志自动清理
enable_auto_cleanup = true

# -------- 时间限制 --------

# 日志文件保留天数
# 超过此天数的文件将被自动删除
# 建议：1-30天
max_age_days = 3

# -------- 文件数量限制 --------

# 每个子目录最大文件数量（单个扩展名）
# 例如：.log文件最多保留 max_files_per_dir 个
# 超过此数量将删除最旧的文件
# 建议：100-1000
max_files_per_dir = 20

# -------- 清理范围 --------

# 需要清理的目录列表（相对logs目录）
# 留空表示清理所有子目录
# 示例：debug-log,loading-stock,server-debug
cleanup_directories = debug-log,loading-stock,server-debug,bot-chat,client-loading

# 需要清理的文件扩展名
# 多个扩展名用逗号分隔
file_extensions = .log,.json

# -------- 清理策略 --------

# 清理执行时机
# "startup": 服务器启动时清理
# "daily": 每天定时清理
# "both": 启动时和每天定时都清理
cleanup_schedule = startup

# 每日清理时间（24小时制，仅当 cleanup_schedule = daily 或 both 时有效）
# 格式：HH:MM
daily_cleanup_time = 02:00

# 是否在清理前创建备份
# true: 删除前将文件打包备份到 logs/backup/ 目录
# false: 直接删除，不创建备份
create_backup_before_cleanup = false

# 备份保留天数（仅当 create_backup_before_cleanup = true 时有效）
backup_retention_days = 7

# -------- 安全设置 --------

# 是否删除空目录
remove_empty_directories = false

# 最小文件年龄（秒），小于此年龄的文件不删除
# 防止删除正在使用的文件
# 建议：3600秒（1小时）
min_file_age_seconds = 3600

# 是否在清理时记录日志
log_cleanup_operations = true

# -------- 调试设置 --------

# 调试模式：仅显示将要删除的文件，不实际删除
# true: 模拟清理，不删除文件（用于测试）
# false: 实际删除文件
dry_run = false


[akshare_rate_limit]
# ========================================
# Akshare API 速率限制配置
# ========================================
# 说明：
# - 控制对 Akshare API 的请求频率
# - 避免因并发请求过多导致服务器拒绝连接
# - 建议根据网络环境和数据源响应速度调整

# -------- 请求间隔控制 --------

# 最小请求间隔（秒）
# 建议：0.5-2.0秒，防止触发服务器限流
# 注意：Akshare服务器对某些API有严格限流，建议设置1.0秒以上
min_request_interval = 1.0

# -------- 并发控制 --------

# 最大并发请求数
# 建议：2-5个，避免同时发送太多请求
# 注意：已发现某些API对并发敏感，建议设置为2
max_concurrent_requests = 2

# 请求队列超时时间（秒）
# 在队列中等待的最大时间
request_queue_timeout = 30.0

# -------- 熔断器配置 --------

# 失败次数阈值（触发熔断）
# 连续失败达到此数量后，熔断器打开
# 建议：10-20次，避免过早触发
circuit_breaker_threshold = 15

# 熔断恢复时间（秒）
# 熔断器打开后，等待多久尝试恢复
# 建议：60-120秒，给服务器足够恢复时间
circuit_breaker_recovery = 120.0

# 半开状态最大尝试次数
# 熔断器恢复时，允许的测试请求数
# 建议：1-3次
half_open_max_calls = 3

# -------- 重试配置 --------

# 最大重试次数
# 建议：3-5次，避免无限重试
max_retries = 5

# 基础退避时间（秒）
# 第一次重试等待时间
base_backoff = 2.0

# 最大退避时间（秒）
# 重试等待时间的上限
max_backoff = 30.0


[log_line_limit]
# ========================================
# 日志文件行数限制配置
# ========================================
# 说明：
# - 控制日志文件的最大行数，超过则自动删除旧日志
# - 只保留最新的日志内容，避免日志文件无限增长
# - 使用 LineLimitedFileHandler 实现

# 是否启用日志行数限制
# true: 启用行数限制，超过 max_lines 自动裁剪
# false: 不限制行数，日志文件会持续增长
enable_line_limit = true

# -------- 行数限制配置 --------

# app.log 最大保留行数
# 建议：100-500行，根据实际需求调整
# 超过此行数时，自动删除最旧的日志
app_log_max_lines = 300

# error.log 最大保留行数
# 建议：100-300行，错误日志通常需要保留更多
error_log_max_lines = 300

# -------- 裁剪策略 --------

# 裁剪触发方式
# "immediate": 每次写入后立即检查并裁剪（实时性好，性能稍低）
# "threshold": 超过阈值时才裁剪（性能更好，适合高频日志）
trim_strategy = immediate

# 裁剪阈值百分比（仅当 trim_strategy = threshold 时有效）
# 当行数超过 max_lines * (1 + trim_threshold_percent/100) 时才裁剪
# 例如：max_lines=100, trim_threshold_percent=20
#       则超过 120 行时才裁剪到 100 行
trim_threshold_percent = 20

# -------- 性能优化 --------

# 是否启用异步裁剪
# true: 裁剪操作在后台线程执行，不影响主线程
# false: 同步裁剪，可能在日志量大时影响性能
async_trim = false

# 是否在裁剪时输出提示信息
# true: 在控制台输出裁剪信息
# false: 静默裁剪
show_trim_info = true

# -------- 调试设置 --------

# 调试模式：记录裁剪操作到单独文件
# true: 记录详细的裁剪日志到 logs/trim-debug.log
# false: 不记录详细裁剪日志
debug_trim = false
