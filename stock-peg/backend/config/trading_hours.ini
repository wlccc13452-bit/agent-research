[trading_hours]
# ========================================
# A股交易时段配置
# ========================================
# 说明：
# - 交易时段格式：HH:MM-HH:MM（24小时制）
# - 支持多个时段，用逗号分隔
# - 配置修改后需重启后端服务生效
# - 前端UI修改会自动更新此文件

# 上午盘交易时段
morning_session_start = 09:30
morning_session_end = 11:30

# 下午盘交易时段
afternoon_session_start = 13:00
afternoon_session_end = 15:00

# 交易日配置（周几交易）
# 1=周一, 2=周二, ..., 5=周五, 6=周六, 7=周日
# 示例：1,2,3,4,5 表示周一到周五
trading_days = 1,2,3,4,5

# 价格提醒检查频率（分钟）
# 建议值：1-5分钟
price_alert_check_interval = 1

[monitor_settings]
# ========================================
# 监控设置
# ========================================

# 是否启用价格提醒监控
enable_price_alert_monitoring = true

# 预警触发后是否自动停止监控（避免重复推送）
auto_stop_after_trigger = true

# 市场情绪数据更新频率（分钟）
market_sentiment_update_interval = 5
